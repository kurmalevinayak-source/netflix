name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Grant GITHUB_TOKEN the right permissions for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Flutter (stable channel)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # 3. Enable Flutter Web support
      - name: Enable Flutter Web
        run: flutter config --enable-web

      # 4. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Build Flutter Web with correct base-href for GitHub Pages
      #    The repo name is "netflix" → base-href must be "/netflix/"
      - name: Build Flutter Web
        run: flutter build web --release --base-href "/netflix/"

      # 6. Configure GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 7. Upload the build/web folder as a Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
